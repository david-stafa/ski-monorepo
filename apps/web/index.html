<!doctype html>
<html lang="en">
  <head>
    <!-- Must match ThemeProvider storageKey + defaultTheme; runs before paint to avoid light flash on reload -->
    <script>
      (function () {
        try {
          var key = 'vite-ui-theme'
          var theme = localStorage.getItem(key) || 'system'
          var root = document.documentElement
          root.classList.remove('light', 'dark')
          if (theme === 'system') {
            var dark = window.matchMedia('(prefers-color-scheme: dark)').matches
            root.classList.add(dark ? 'dark' : 'light')
          } else {
            root.classList.add(theme)
          }
        } catch (_) {}
      })()
    </script>
    <!-- Inline so first paint matches theme before globals.css loads from the JS bundle -->
    <style>
      html {
        min-height: 100vh;
        min-height: 100dvh;
      }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
      }
      html.dark,
      html.dark body {
        background-color: #0c0c0f;
        background-color: oklch(0.141 0.005 285.823);
        color-scheme: dark;
      }
      html.light,
      html.light body {
        background-color: #ffffff;
        background-color: oklch(1 0 0);
        color-scheme: light;
      }
      /* Script failed (e.g. private mode): still match OS theme for first paint */
      @media (prefers-color-scheme: dark) {
        html:not(.light):not(.dark),
        html:not(.light):not(.dark) body {
          background-color: #0c0c0f;
          background-color: oklch(0.141 0.005 285.823);
          color-scheme: dark;
        }
      }
    </style>
    <!-- <script src="https://unpkg.com/react-scan/dist/auto.global.js"></script> -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ski Blazek</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
